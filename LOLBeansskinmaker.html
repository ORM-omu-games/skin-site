<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bean Skin Studio</title>

<style>
body {
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h3 { font-size:28px; }

button {
  background:#00c6ff;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

canvas { border:1px solid #555; }
img { margin:5px; cursor:pointer; }
</style>
</head>

<body>

<h3>🔥 Bean Skin Studio</h3>

色 <input type="color" id="color">
サイズ <input type="range" id="size" min="1" max="20" value="5">

<select id="layer">
  <option value="body">ボディ</option>
  <option value="hat">帽子</option>
</select>

<br><br>

<button onclick="save()">☁️ 共有URL作る</button>
<p id="link"></p>

<div id="app"></div>

<h3>🖼️ ギャラリー</h3>
<div id="gallery"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyALuGjtuTGpK8WwDKmdCIRupp87VZlodHs",
  authDomain: "urlshare-7d5f3.firebaseapp.com",
  projectId: "urlshare-7d5f3",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 3D
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(400,400);
document.getElementById("app").appendChild(renderer.domElement);

// キャンバス
const bodyCanvas=document.createElement("canvas");
const hatCanvas=document.createElement("canvas");

bodyCanvas.width=hatCanvas.width=256;
bodyCanvas.height=hatCanvas.height=256;

const bodyCtx=bodyCanvas.getContext("2d");
const hatCtx=hatCanvas.getContext("2d");

const bodyTex=new THREE.CanvasTexture(bodyCanvas);
const hatTex=new THREE.CanvasTexture(hatCanvas);

// モデル
const bodyMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshBasicMaterial({map:bodyTex})
);

const hatMesh=new THREE.Mesh(
  new THREE.SphereGeometry(1.05,32,32),
  new THREE.MeshBasicMaterial({map:hatTex, transparent:true})
);

// 豆っぽく
bodyMesh.scale.y=1.3;
hatMesh.scale.y=1.3;

scene.add(bodyMesh);
scene.add(hatMesh);

camera.position.z=3;

// 描画
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let drawing=false;

renderer.domElement.addEventListener("mousedown",()=>drawing=true);
renderer.domElement.addEventListener("mouseup",()=>drawing=false);

renderer.domElement.addEventListener("mousemove",(event)=>{
  if(!drawing)return;

  const rect=renderer.domElement.getBoundingClientRect();

  mouse.x=((event.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;

  raycaster.setFromCamera(mouse,camera);

  const layer=document.getElementById("layer").value;
  const mesh = layer==="body"?bodyMesh:hatMesh;
  const ctx = layer==="body"?bodyCtx:hatCtx;

  const hit=raycaster.intersectObject(mesh);

  if(hit.length>0){
    const uv=hit[0].uv;

    const x=uv.x*256;
    const y=(1-uv.y)*256;

    ctx.fillStyle=document.getElementById("color").value;
    const size=document.getElementById("size").value;

    ctx.beginPath();
    ctx.arc(x,y,size,0,Math.PI*2);
    ctx.fill();

    bodyTex.needsUpdate=true;
    hatTex.needsUpdate=true;
  }
});

// 回転
function animate(){
  requestAnimationFrame(animate);
  bodyMesh.rotation.y+=0.01;
  hatMesh.rotation.y+=0.01;
  renderer.render(scene,camera);
}
animate();

// 保存
async function save(){
  const data={
    body: bodyCanvas.toDataURL(),
    hat: hatCanvas.toDataURL()
  };

  const docRef=await addDoc(collection(db,"skins"),data);

  const url=location.origin+location.pathname+"?id="+docRef.id;

  document.getElementById("link").innerHTML=
    `<a href="${url}" target="_blank">${url}</a>`;
}

// 読み込み
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

if(id){
  const docRef=doc(db,"skins",id);
  getDoc(docRef).then(snap=>{
    if(snap.exists()){
      const data=snap.data();

      const img1=new Image();
      img1.onload=()=>{
        bodyCtx.drawImage(img1,0,0);
        bodyTex.needsUpdate=true;
      };
      img1.src=data.body;

      const img2=new Image();
      img2.onload=()=>{
        hatCtx.drawImage(img2,0,0);
        hatTex.needsUpdate=true;
      };
      img2.src=data.hat;
    }
  });
}

// ギャラリー
async function loadGallery(){
  const querySnapshot=await getDocs(collection(db,"skins"));
  const gallery=document.getElementById("gallery");

  querySnapshot.forEach(docSnap=>{
    const data=docSnap.data();

    const img=document.createElement("img");
    img.src=data.body;
    img.width=80;

    img.onclick=()=>{
      location.href=location.pathname+"?id="+docSnap.id;
    };

    gallery.appendChild(img);
  });
}

loadGallery();

</script>

</body>
</html>
