<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LOLBeans Skin Maker</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#6ec6ff,#2196f3);
  color:white;
  text-align:center;
}

#ui{
  padding:10px;
  background:rgba(0,0,0,0.3);
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

canvas{
  border-radius:10px;
}

#gallery img{
  width:80px;
  margin:5px;
  cursor:pointer;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
<h2>🔥 LOLBeans Skin Maker</h2>

色A <input type="color" id="colorA" value="#ff0000">
色B <input type="color" id="colorB" value="#00ff00">
色C <input type="color" id="colorC" value="#0000ff">

<select id="mode">
  <option value="base">BC</option>
  <option value="decal">Decal</option>
</select>

サイズ <input type="range" id="size" min="1" max="20" value="5">

<br><br>

<button onclick="download()">PNG保存</button>
<button onclick="share()">共有</button>

<p id="link"></p>
</div>

<div id="app"></div>

<h3>ギャラリー</h3>
<div id="gallery"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// Firebase
const app=initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"urlshare-7d5f3.firebaseapp.com",
  projectId:"urlshare-7d5f3"
});
const db=getFirestore(app);

// Canvas
const baseCanvas=document.createElement("canvas");
const decalCanvas=document.createElement("canvas");
baseCanvas.width=decalCanvas.width=256;
baseCanvas.height=decalCanvas.height=256;

const baseCtx=baseCanvas.getContext("2d");
const decalCtx=decalCanvas.getContext("2d");

// 初期BC
for(let y=0;y<256;y++){
  baseCtx.fillStyle=`rgb(${y},0,0)`;
  baseCtx.fillRect(0,y,256,1);
}

// 顔
decalCtx.fillStyle="black";
decalCtx.fillRect(90,100,20,20);
decalCtx.fillRect(140,100,20,20);

// 合成
const finalCanvas=document.createElement("canvas");
finalCanvas.width=256;
finalCanvas.height=256;
const finalCtx=finalCanvas.getContext("2d");

// 色変換
function hexToRgb(hex){
  const n=parseInt(hex.slice(1),16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}

function applyColor(){
  const A=hexToRgb(colorA.value);
  const B=hexToRgb(colorB.value);
  const C=hexToRgb(colorC.value);

  const img=baseCtx.getImageData(0,0,256,256);
  const d=img.data;

  for(let i=0;i<d.length;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];

    if(r>g&&r>b){
      d[i]=A.r*(r/255);
      d[i+1]=A.g*(r/255);
      d[i+2]=A.b*(r/255);
    }
    if(g>r&&g>b){
      d[i]=B.r*(g/255);
      d[i+1]=B.g*(g/255);
      d[i+2]=B.b*(g/255);
    }
    if(b>r&&b>g){
      d[i]=C.r*(b/255);
      d[i+1]=C.g*(b/255);
      d[i+2]=C.b*(b/255);
    }
  }

  finalCtx.putImageData(img,0,0);
  finalCtx.drawImage(decalCanvas,0,0);

  texture.needsUpdate=true;
}

// 3D
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,1,0.1,1000);
camera.position.z=3;

const renderer=new THREE.WebGLRenderer();
renderer.setSize(400,400);
appDiv.appendChild(renderer.domElement);

const texture=new THREE.CanvasTexture(finalCanvas);

const mesh=new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshStandardMaterial({map:texture})
);

mesh.scale.y=1.3;
scene.add(mesh);

const light=new THREE.DirectionalLight(0xffffff,1);
scene.add(light);

// 回転
let drag=false,px=0;
renderer.domElement.onmousedown=e=>{drag=true;px=e.clientX};
renderer.domElement.onmouseup=()=>drag=false;
renderer.domElement.onmousemove=e=>{
  if(!drag)return;
  mesh.rotation.y+=(e.clientX-px)*0.01;
  px=e.clientX;
};

// 描画
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

renderer.domElement.onclick=e=>{
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;

  raycaster.setFromCamera(mouse,camera);
  const hit=raycaster.intersectObject(mesh);

  if(hit.length){
    const uv=hit[0].uv;
    const x=uv.x*256;
    const y=(1-uv.y)*256;

    const ctx = mode.value==="base"?baseCtx:decalCtx;

    ctx.fillStyle= mode.value==="base"?"red":"black";

    ctx.beginPath();
    ctx.arc(x,y,size.value,0,Math.PI*2);
    ctx.fill();

    applyColor();
  }
};

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

applyColor();

// 保存
function download(){
  const a=document.createElement("a");
  a.href=finalCanvas.toDataURL();
  a.download="skin.png";
  a.click();
}

// 共有
async function share(){
  const docRef=await addDoc(collection(db,"skins"),{
    img:finalCanvas.toDataURL()
  });

  const url=location.href+"?id="+docRef.id;
  link.innerHTML=`<a href="${url}" target="_blank">${url}</a>`;
}

// ギャラリー
async function loadGallery(){
  const snap=await getDocs(collection(db,"skins"));
  snap.forEach(doc=>{
    const img=document.createElement("img");
    img.src=doc.data().img;
    gallery.appendChild(img);
  });
}
loadGallery();

</script>

</body>
</html>
